name: Demand Forecasting MLOps CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/demand-forecast-api

jobs:
  # ================================================================== #
  #  Job 1 — Test                                                        #
  # ================================================================== #
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  # ================================================================== #
  #  Job 2 — Train + Log to DagsHub MLflow                              #
  # ================================================================== #
  train:
    name: Train Model & Track with MLflow
    runs-on: ubuntu-latest
    needs: test

    env:
      # DagsHub provides a free hosted MLflow server.
      # Format: https://dagshub.com/<USERNAME>/<REPO>.mlflow
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      DAGSHUB_USERNAME:    ${{ secrets.DAGSHUB_USERNAME }}
      DAGSHUB_TOKEN:       ${{ secrets.DAGSHUB_TOKEN }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
      PYTHONPATH: "."

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ingest data
        run: python src/data/ingest.py

      - name: Preprocess data
        run: python src/data/preprocess.py

      - name: Feature engineering
        run: python src/features/feature_engineering.py

      - name: Train models (logs to MLflow / DagsHub)
        run: python src/models/train.py

      - name: Evaluate model
        run: python src/models/evaluate.py

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: best-model
          path: models/best_model.pkl
          retention-days: 30

      - name: Upload evaluation report
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-report
          path: reports/evaluation_report.html
          retention-days: 30

  # ================================================================== #
  #  Job 3 — Deploy to Render + Docker Hub                              #
  # ================================================================== #
  deploy:
    name: Build Docker & Deploy
    runs-on: ubuntu-latest
    needs: train
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: best-model
          path: models/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Render re-deploy
        if: ${{ secrets.RENDER_DEPLOY_HOOK != '' }}
        run: |
          curl -s "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            -X POST \
            -d "" \
            -o /dev/null \
            -w "Render deploy HTTP status: %{http_code}\n"

      - name: Deployment summary
        run: |
          echo "## Deployment Summary 🚀" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Image | \`${{ env.DOCKER_IMAGE }}:${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| MLflow Tracking | \`${{ secrets.MLFLOW_TRACKING_URI }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Render Deploy | Triggered ✅ |" >> $GITHUB_STEP_SUMMARY

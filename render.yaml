services:
  # ── FastAPI + Frontend ──────────────────────────────────────────────
  - type: web
    name: demand-forecast-api
    runtime: python
    region: oregon
    plan: free                         # free tier (512 MB RAM, spins down on idle)
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python start.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: PYTHONPATH
        value: "."
      - key: MLFLOW_TRACKING_URI
        sync: false          # set manually in Render dashboard
      - key: DAGSHUB_USERNAME
        sync: false
      - key: DAGSHUB_TOKEN
        sync: false
    healthCheckPath: /health
    autoDeploy: true
